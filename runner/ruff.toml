    "DTZ",           # no naive datetime — use IST-aware zoneinfo
    "S102",          # no exec()
    "S301",          # no pickle
    "B",             # bugbear bad practices
    "ASYNC",         # common async mistakes
    "RET",           # return-value consistency
]
