# Ruff config for scripts/forge_runner/ only.
# This file extends the project-wide pyproject.toml config (root).
# Rules mandated by research.md §9 and the constitution.

extend = "../../pyproject.toml"

[lint]
select = [
    "E", "F", "W",  # project baseline
